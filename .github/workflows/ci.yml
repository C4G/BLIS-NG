name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          cache: true
      - run: dotnet publish -r win-x64 -c Release /WarnAsError
      - uses: actions/upload-artifact@v7
        with:
          name: blis-ng-exe
          path: bin/Release/net10.0/win-x64/publish/BLIS-NG.exe
